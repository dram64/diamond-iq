name: backend-ci

on:
  pull_request:
    branches: [main]
    paths:
      - 'functions/**'
      - 'infrastructure/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/ci.yml'
      - '.github/workflows/deploy.yml'
  push:
    branches: [main]
    paths:
      - 'functions/**'
      - 'infrastructure/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/ci.yml'
      - '.github/workflows/deploy.yml'

permissions:
  contents: read

# Don't run two CI jobs against the same ref simultaneously.
concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-format:
    name: Lint & format
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@bd01e18f51369d5a26f1651c3cb451d3417e3bba # v6.3.1
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Black check
        run: uv run black --check .

  test:
    name: pytest
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@bd01e18f51369d5a26f1651c3cb451d3417e3bba # v6.3.1
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest -v

  terraform-validate:
    name: Terraform validate (${{ matrix.dir }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        dir:
          - infrastructure
          - infrastructure/bootstrap
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ~1.7
          terraform_wrapper: false

      - name: terraform fmt
        run: terraform -chdir=${{ matrix.dir }} fmt -check -recursive

      - name: terraform init (no backend)
        run: terraform -chdir=${{ matrix.dir }} init -backend=false -input=false

      - name: terraform validate
        run: terraform -chdir=${{ matrix.dir }} validate

name: backend-deploy

on:
  push:
    branches: [main]
    paths:
      - 'functions/**'
      - 'infrastructure/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/deploy.yml'

permissions:
  id-token: write   # required to mint the OIDC token for AssumeRoleWithWebIdentity
  contents: read

# Serialize deploys; cancelling an in-flight terraform apply mid-run is unsafe.
concurrency:
  group: backend-deploy
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  AWS_ROLE_ARN: arn:aws:iam::334856751632:role/diamond-iq-github-deploy
  # Alert email for SNS subscription. Populated from a repository secret
  # so the value never lands in source. Required — `var.alert_email` has
  # no default, so a missing secret intentionally fails terraform plan.
  TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}

jobs:
  deploy:
    name: Terraform apply
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          role-session-name: github-actions-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sanity check assumed identity
        run: aws sts get-caller-identity

      - name: Install uv
        uses: astral-sh/setup-uv@bd01e18f51369d5a26f1651c3cb451d3417e3bba # v6.3.1
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ~1.7
          terraform_wrapper: false

      - name: terraform init
        working-directory: infrastructure
        run: terraform init -input=false

      - name: terraform plan
        working-directory: infrastructure
        run: terraform plan -input=false -out=tfplan -no-color

      - name: Upload plan artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: tfplan-${{ github.run_id }}
          path: infrastructure/tfplan
          retention-days: 14

      - name: terraform apply
        working-directory: infrastructure
        run: terraform apply -input=false -auto-approve tfplan

      - name: Capture outputs
        id: tf
        working-directory: infrastructure
        run: |
          echo "api_endpoint=$(terraform output -raw api_endpoint)" >> "$GITHUB_OUTPUT"
          echo "games_table=$(terraform output -raw games_table_name)" >> "$GITHUB_OUTPUT"
          echo "ingest_lambda=$(terraform output -raw ingest_lambda_name)" >> "$GITHUB_OUTPUT"
          echo "api_lambda=$(terraform output -raw api_lambda_name)" >> "$GITHUB_OUTPUT"

      - name: Write deploy summary
        run: |
          {
            echo "## Deploy summary"
            echo
            echo "| Output | Value |"
            echo "| --- | --- |"
            echo "| API endpoint | \`${{ steps.tf.outputs.api_endpoint }}\` |"
            echo "| Games table | \`${{ steps.tf.outputs.games_table }}\` |"
            echo "| Ingest Lambda | \`${{ steps.tf.outputs.ingest_lambda }}\` |"
            echo "| API Lambda | \`${{ steps.tf.outputs.api_lambda }}\` |"
            echo "| Commit | \`${{ github.sha }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
